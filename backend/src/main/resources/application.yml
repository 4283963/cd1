spring:
  application:
    name: cat-feeder-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/catfeeder
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: 1000ms
          max-idle: 4
          min-idle: 0
      connect-timeout: 2000ms

server:
  port: 8080
  servlet:
    context-path: /api
  tomcat:
    connection-timeout: 10s
    keep-alive-timeout: 60s

app:
  food-warning-threshold: 20
  water-warning-threshold: 20
  image-storage-path: ./uploads/images
  lock:
    wait-time: 3000
    lease-time: 10000
